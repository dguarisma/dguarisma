
<svg viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg" width="1500" height="500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&amp;family=DM+Mono:wght@400;500&amp;display=swap');
    </style>

    <!-- Background grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2a3a" stroke-width="0.5"/>
    </pattern>

    <!-- Glow for accent elements -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for rounded corners on whole banner -->
    <clipPath id="rounded">
      <rect width="1500" height="500" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Dark base -->
    <rect width="1500" height="500" fill="#050d18"/>

    <!-- Grid overlay -->
    <rect width="1500" height="500" fill="url(#grid)" opacity="0.4"/>

    <!-- Accent geometric shapes - left side -->
    <rect x="-20" y="60" width="180" height="3" fill="#1a6fb5" opacity="0.8"/>
    <rect x="-20" y="68" width="120" height="1" fill="#1a6fb5" opacity="0.4"/>

    <!-- Large circle accent top right -->
    <circle cx="1320" cy="-40" r="280" fill="none" stroke="#0d3d6e" stroke-width="1"/>
    <circle cx="1320" cy="-40" r="200" fill="none" stroke="#0d3d6e" stroke-width="0.5"/>
    <circle cx="1320" cy="-40" r="340" fill="none" stroke="#0a2a4a" stroke-width="1.5"/>

    <!-- Accent dot cluster top right -->
    <circle cx="1200" cy="80" r="3" fill="#1a6fb5" opacity="0.9" filter="url(#glow)"/>
    <circle cx="1220" cy="65" r="2" fill="#0ea5e9" opacity="0.7"/>
    <circle cx="1240" cy="90" r="1.5" fill="#1a6fb5" opacity="0.5"/>
    <circle cx="1180" cy="100" r="1" fill="#0ea5e9" opacity="0.4"/>

    <!-- Bottom left accent shape -->
    <polygon points="0,500 140,500 0,360" fill="#071525" opacity="0.9"/>
    <line x1="0" y1="360" x2="140" y2="500" stroke="#1a6fb5" stroke-width="1" opacity="0.6"/>

    <!-- Horizontal accent line -->
    <line x1="100" y1="420" x2="680" y2="420" stroke="#0d3d6e" stroke-width="0.5"/>
    <line x1="100" y1="422" x2="300" y2="422" stroke="#1a6fb5" stroke-width="1" opacity="0.5"/>

    <!-- AI nodes visual element - right side -->
    <g opacity="0.25">
      <circle cx="1100" cy="300" r="18" fill="none" stroke="#1a6fb5" stroke-width="1"/>
      <circle cx="1160" cy="240" r="14" fill="none" stroke="#1a6fb5" stroke-width="1"/>
      <circle cx="1240" cy="280" r="22" fill="none" stroke="#1a6fb5" stroke-width="1"/>
      <circle cx="1180" cy="350" r="12" fill="none" stroke="#1a6fb5" stroke-width="1"/>
      <circle cx="1300" cy="200" r="10" fill="none" stroke="#0ea5e9" stroke-width="1"/>
      <circle cx="1360" cy="310" r="16" fill="none" stroke="#1a6fb5" stroke-width="1"/>
      <circle cx="1420" cy="240" r="8" fill="none" stroke="#0ea5e9" stroke-width="1"/>
      <!-- Connecting lines -->
      <line x1="1100" y1="300" x2="1160" y2="240" stroke="#1a6fb5" stroke-width="0.8"/>
      <line x1="1160" y1="240" x2="1240" y2="280" stroke="#1a6fb5" stroke-width="0.8"/>
      <line x1="1240" y1="280" x2="1180" y2="350" stroke="#1a6fb5" stroke-width="0.8"/>
      <line x1="1240" y1="280" x2="1300" y2="200" stroke="#0ea5e9" stroke-width="0.8"/>
      <line x1="1300" y1="200" x2="1360" y2="310" stroke="#1a6fb5" stroke-width="0.8"/>
      <line x1="1360" y1="310" x2="1420" y2="240" stroke="#0ea5e9" stroke-width="0.8"/>
      <line x1="1100" y1="300" x2="1180" y2="350" stroke="#1a6fb5" stroke-width="0.8"/>
    </g>

    <!-- Vertical accent bar -->
    <rect x="100" y="120" width="3" height="220" fill="#1a6fb5" opacity="0.9"/>
    <rect x="103" y="120" width="1" height="100" fill="#0ea5e9" opacity="0.5"/>

    <!-- MAIN NAME -->
    <text x="136" y="200" font-family="'Syne', 'Arial Black', sans-serif" font-weight="800" font-size="72" fill="#f0f8ff" letter-spacing="-1">David Guarisma</text>

    <!-- Role line -->
    <text x="138" y="252" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#5ba3d9" letter-spacing="2">HEAD OF TECHNOLOGY</text>

    <!-- Divider dot -->
    <circle cx="136" cy="285" r="3" fill="#1a6fb5"/>
    <line x1="144" y1="285" x2="560" y2="285" stroke="#0d3d6e" stroke-width="1"/>

    <!-- Tag pills -->
    <!-- AI pill -->
    <rect x="136" y="308" width="130" height="30" rx="15" fill="#071e35" stroke="#1a6fb5" stroke-width="1"/>
    <text x="201" y="328" font-family="'DM Mono', monospace" font-size="13" fill="#5ba3d9" text-anchor="middle">AI Builder</text>

    <!-- E-commerce pill -->
    <rect x="278" y="308" width="140" height="30" rx="15" fill="#071e35" stroke="#0d3d6e" stroke-width="1"/>
    <text x="348" y="328" font-family="'DM Mono', monospace" font-size="13" fill="#4a8ab5" text-anchor="middle">E-commerce</text>

    <!-- Claude pill -->
    <rect x="430" y="308" width="155" height="30" rx="15" fill="#0d1f10" stroke="#1a7a30" stroke-width="1"/>
    <text x="507" y="328" font-family="'DM Mono', monospace" font-size="13" fill="#4ab56a" text-anchor="middle">Claude · ChatGPT</text>

    <!-- Superfüds pill -->
    <rect x="597" y="308" width="120" height="30" rx="15" fill="#1a1200" stroke="#8a6a00" stroke-width="1"/>
    <text x="657" y="328" font-family="'DM Mono', monospace" font-size="13" fill="#c9a020" text-anchor="middle">Superfüds</text>

    <!-- Colombia -->
    <rect x="729" y="308" width="110" height="30" rx="15" fill="#071e35" stroke="#0d3d6e" stroke-width="1"/>
    <text x="784" y="328" font-family="'DM Mono', monospace" font-size="13" fill="#4a8ab5" text-anchor="middle">Colombia 🇨🇴</text>

    <!-- Quote -->
    <text x="136" y="390" font-family="'Syne', sans-serif" font-size="16" fill="#2a5a8a" font-style="italic">"El mejor código es el que resuelve el problema correcto."</text>

    <!-- Bottom links -->
    <text x="136" y="440" font-family="'DM Mono', monospace" font-size="13" fill="#1a4a6e">github.com/dguarisma</text>
    <text x="136" y="460" font-family="'DM Mono', monospace" font-size="13" fill="#1a4a6e">linkedin.com/in/dguarisma</text>

    <!-- Top right small label -->
    <text x="1460" y="460" font-family="'DM Mono', monospace" font-size="11" fill="#0d3d6e" text-anchor="end">10+ years building software</text>
    <text x="1460" y="478" font-family="'DM Mono', monospace" font-size="11" fill="#0d3d6e" text-anchor="end">AI · Full Stack · Leadership</text>

    <!-- Accent corner top left -->
    <rect x="0" y="0" width="6" height="80" fill="#1a6fb5" opacity="0.8"/>
    <rect x="0" y="0" width="80" height="6" fill="#1a6fb5" opacity="0.8"/>

    <!-- Accent corner bottom right -->
    <rect x="1494" y="420" width="6" height="80" fill="#0d3d6e" opacity="0.6"/>
    <rect x="1420" y="494" width="80" height="6" fill="#0d3d6e" opacity="0.6"/>
  </g>
</svg>
